# =============================================================================
# slam_params.yaml
# SLAM Toolbox configuration for online async mapping and localization.
# Optimized for the Hokuyo UST-10LX on the F1TENTH Traxxas Slash 4x4.
# =============================================================================

slam_toolbox:
  ros__parameters:

    # --- Solver plugin ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # --- Odometry / TF frame names ---
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping    # Override to "localization" in racing.launch.py

    # --- Map resolution & size ---
    resolution: 0.05               # [m/cell] 5 cm map resolution
    max_laser_range: 10.0          # [m] Match Hokuyo UST-10LX range
    minimum_travel_distance: 0.1   # [m] Minimum distance between scans to accept new keyframe
    minimum_travel_heading: 0.1    # [rad] Minimum heading change between keyframes

    # --- Loop closure ---
    do_loop_closing: true
    loop_search_space_dimension: 8.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # --- Map saving ---
    map_file_name: "f1tenth_track"   # saved to maps/ directory by map_saver
    map_start_at_dock: true

    # --- Intel NUC performance knobs ---
    ceres_num_threads: 4          # Use 4 of 12 threads for SLAM (leave 8 for MPPI)
    scan_buffer_size: 10
    link_match_minimum_response_fine: 0.45
    link_scan_maximum_distance: 1.5
